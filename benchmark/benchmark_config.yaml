# Benchmark configuration
# All fields have defaults; CLI flags override YAML values.
#
# Usage:
#   ./benchmark --config benchmark/benchmark_config.yaml
#   ./benchmark --config benchmark/benchmark_config.yaml --mode sync --duration 30

# ── Model & data ─────────────────────────────────────────────
config_path: "config/model_config.yaml"  # model YAML
image_path: "assets/bus.png"

# ── Runtime ──────────────────────────────────────────────────
model_type: "yolo"       # yolo | nafnet
mode: "all"              # sync | async | batch | all
show_gpu_stats: true

# ── Benchmark parameters ─────────────────────────────────────
warmup_count: 5
test_duration_sec: 10.0
min_iterations: 50
concurrent_clients: 16

# ── Per-scheduler model overrides ────────────────────────────
# Only the fields you set will override the base model config;
# the rest are inherited from config_path.

# SyncScheduler: single-image sequential — batch=1 is optimal
sync_override:
  batch: 1
  buffer_size: 1

# AsyncScheduler: pipelined, still one infer per image — batch=1
async_override:
  batch: 1
  buffer_size: 4

# BatchScheduler: accumulates images into micro-batches — use larger batch
batch_override:
  batch: 8
  buffer_size: 8

# ── Output ───────────────────────────────────────────────────
output_dir: "./benchmark_output"
export_json: true
export_csv: true
